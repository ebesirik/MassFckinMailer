name: Channel builds

# Pushes to the channel branches publish a rolling pre-release:
#   beta -> tag "beta"    (title "Beta")
#   dev  -> tag "nightly" (title "Nightly")
# master is NOT here on purpose — stable releases come from `v*` tags
# (see release.yml). Each channel keeps ONE release whose tag moves to the
# latest commit and whose per-platform assets are overwritten in place.
on:
  push:
    branches: [beta, dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: channel-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Prepare ${{ github.ref_name }} release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.channel.outputs.tag }}
      title: ${{ steps.channel.outputs.title }}
    steps:
      - uses: actions/checkout@v4

      - id: channel
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            beta) tag=beta;    title=Beta ;;
            dev)  tag=nightly; title=Nightly ;;
            *)    tag="${GITHUB_REF_NAME}"; title="${GITHUB_REF_NAME}" ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      # Point the rolling tag at this commit so the release tracks latest.
      - name: Move rolling tag
        shell: bash
        run: |
          git tag -f "${{ steps.channel.outputs.tag }}"
          git push -f origin "refs/tags/${{ steps.channel.outputs.tag }}"

      # Create/refresh the release shell before the matrix uploads assets,
      # so the three build jobs don't race to create it.
      - name: Ensure release exists
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          name: ${{ steps.channel.outputs.title }} (rolling)
          prerelease: true
          body: |
            Automated ${{ steps.channel.outputs.title }} build from `${{ github.ref_name }}` (${{ github.sha }}).

            ⚠️ Pre-release — for testing, not a stable version.

  build:
    name: ${{ matrix.target_name }} (${{ needs.meta.outputs.title }})
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
          - os: macos-latest
            target_name: macos-aarch64
          - os: windows-latest
            target_name: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake clang \
            libfontconfig-dev libfreetype6-dev \
            libwayland-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libssl-dev libvulkan-dev libgl1-mesa-dev

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Version = workspace version (Cargo.toml) + channel + build number
      # (github.run_number), e.g. 0.1.0-nightly.20260703.42. Embedded in the
      # binary and used by the installer.
      - name: Compute version
        shell: bash
        run: |
          base=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          case "${{ needs.meta.outputs.tag }}" in
            beta)    ver="${base}-beta.${{ github.run_number }}" ;;
            nightly) ver="${base}-nightly.$(date -u +%Y%m%d).${{ github.run_number }}" ;;
            *)       ver="${base}-${{ needs.meta.outputs.tag }}.${{ github.run_number }}" ;;
          esac
          echo "MFM_VERSION=$ver" >> "$GITHUB_ENV"
          echo "Version: $ver"

      - name: Build
        run: cargo build -p mmm-app --release --locked

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          staging="massfckinmailer-${{ matrix.target_name }}"
          mkdir "$staging"
          cp target/release/massfckinmailer "$staging"/
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging"/
          tar czf "$staging.tar.gz" "$staging"

      - name: Package portable zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "massfckinmailer-${{ matrix.target_name }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item target/release/massfckinmailer.exe $staging/
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE $staging/
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"

      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:MFM_VERSION" `
            "/DOutputBase=massfckinmailer-${{ matrix.target_name }}-setup" `
            installer\windows\massfckinmailer.iss

      # Overwrites the same-named assets on the channel release each run.
      - name: Publish assets (Unix)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          files: massfckinmailer-${{ matrix.target_name }}.tar.gz
          fail_on_unmatched_files: true

      - name: Publish assets (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          files: |
            massfckinmailer-${{ matrix.target_name }}.zip
            dist/massfckinmailer-${{ matrix.target_name }}-setup.exe
          fail_on_unmatched_files: true
