# ── Step hints ──────────────────────────────────────────────────────────
hint.accounts:
  en: "Add a sending account first — SMTP, Mailgun, AWS SES, or Gmail/Outlook. Secrets are stored in your OS keychain, never in project files."
  tr: "Önce bir gönderim hesabı ekleyin — SMTP, Mailgun, AWS SES veya Gmail/Outlook. Parolalar işletim sisteminizin anahtar zincirinde saklanır, asla proje dosyalarında değil."
  es: "Primero añade una cuenta de envío: SMTP, Mailgun, AWS SES o Gmail/Outlook. Los secretos se guardan en el llavero del sistema, nunca en los archivos del proyecto."
  de: "Füge zuerst ein Absenderkonto hinzu — SMTP, Mailgun, AWS SES oder Gmail/Outlook. Geheimnisse werden im Schlüsselbund deines Systems gespeichert, nie in Projektdateien."
  fr: "Ajoutez d'abord un compte d'envoi — SMTP, Mailgun, AWS SES ou Gmail/Outlook. Les secrets sont stockés dans le trousseau du système, jamais dans les fichiers de projet."
  it: "Aggiungi prima un account di invio — SMTP, Mailgun, AWS SES o Gmail/Outlook. Le credenziali sono salvate nel portachiavi del sistema, mai nei file di progetto."
  pt: "Primeiro adicione uma conta de envio — SMTP, Mailgun, AWS SES ou Gmail/Outlook. Os segredos são guardados no chaveiro do sistema, nunca nos ficheiros do projeto."
hint.template:
  en: "Write your email with placeholders like {{first_name}} (##first_name## works too). The subject line is a template as well."
  tr: "E-postanızı {{first_name}} gibi yer tutucularla yazın (##first_name## de çalışır). Konu satırı da bir şablondur."
  es: "Escribe tu correo con marcadores como {{first_name}} (##first_name## también funciona). El asunto también es una plantilla."
  de: "Schreibe deine E-Mail mit Platzhaltern wie {{first_name}} (##first_name## geht auch). Die Betreffzeile ist ebenfalls eine Vorlage."
  fr: "Rédigez votre e-mail avec des variables comme {{first_name}} (##first_name## fonctionne aussi). L'objet est également un modèle."
  it: "Scrivi la tua email con segnaposto come {{first_name}} (funziona anche ##first_name##). Anche l'oggetto è un modello."
  pt: "Escreva o seu e-mail com marcadores como {{first_name}} (##first_name## também funciona). O assunto também é um modelo."
hint.recipients:
  en: "Drop a CSV or Excel file. The email column is detected automatically, and you map the remaining columns to template fields."
  tr: "Bir CSV veya Excel dosyası bırakın. E-posta sütunu otomatik algılanır ve kalan sütunları şablon alanlarıyla eşleştirirsiniz."
  es: "Suelta un archivo CSV o Excel. La columna de correo se detecta automáticamente y asignas las demás columnas a los campos de la plantilla."
  de: "Ziehe eine CSV- oder Excel-Datei hierher. Die E-Mail-Spalte wird automatisch erkannt, und du ordnest die übrigen Spalten den Vorlagenfeldern zu."
  fr: "Déposez un fichier CSV ou Excel. La colonne d'e-mail est détectée automatiquement, et vous associez les autres colonnes aux champs du modèle."
  it: "Trascina un file CSV o Excel. La colonna dell'email viene rilevata automaticamente e mappi le altre colonne ai campi del modello."
  pt: "Arraste um ficheiro CSV ou Excel. A coluna de e-mail é detetada automaticamente e mapeia as restantes colunas para os campos do modelo."
hint.send:
  en: "Review the pre-flight summary, then send. You can cancel at any time — emails already delivered stay delivered."
  tr: "Uçuş öncesi özetini gözden geçirin, ardından gönderin. İstediğiniz an iptal edebilirsiniz — zaten teslim edilen e-postalar teslim edilmiş kalır."
  es: "Revisa el resumen previo y luego envía. Puedes cancelar en cualquier momento: los correos ya entregados permanecen entregados."
  de: "Prüfe die Vorab-Zusammenfassung und sende dann. Du kannst jederzeit abbrechen — bereits zugestellte E-Mails bleiben zugestellt."
  fr: "Vérifiez le récapitulatif avant envoi, puis envoyez. Vous pouvez annuler à tout moment — les e-mails déjà envoyés le restent."
  it: "Controlla il riepilogo pre-invio, poi invia. Puoi annullare in qualsiasi momento: le email già consegnate restano consegnate."
  pt: "Reveja o resumo pré-envio e depois envie. Pode cancelar a qualquer momento — os e-mails já entregues permanecem entregues."

