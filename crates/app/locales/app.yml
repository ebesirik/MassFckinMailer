acct.empty:
  en: "No accounts yet. Add one to begin — then write a template, import recipients, and send. Secrets are kept in your OS keychain."
  tr: "Henüz hesap yok. Başlamak için bir tane ekleyin — ardından bir şablon yazın, alıcıları içe aktarın ve gönderin. Parolalar işletim sisteminizin anahtar zincirinde tutulur."
  es: "Aún no hay cuentas. Añade una para empezar y luego escribe una plantilla, importa destinatarios y envía. Los secretos se guardan en el llavero del sistema."
  de: "Noch keine Konten. Füge eins hinzu, um zu beginnen — schreibe dann eine Vorlage, importiere Empfänger und sende. Geheimnisse bleiben im Schlüsselbund deines Systems."
  fr: "Aucun compte pour l'instant. Ajoutez-en un pour commencer, puis rédigez un modèle, importez des destinataires et envoyez. Les secrets restent dans le trousseau du système."
  it: "Nessun account ancora. Aggiungine uno per iniziare, poi scrivi un modello, importa i destinatari e invia. Le credenziali restano nel portachiavi del sistema."
  pt: "Ainda não há contas. Adicione uma para começar — depois escreva um modelo, importe destinatários e envie. Os segredos ficam no chaveiro do sistema."
