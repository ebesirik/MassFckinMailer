acct.outlook_note:
  en: "In Azure: register an app, add the delegated Mail.Send permission, and under 'Mobile and desktop applications' add the redirect URI http://localhost. No client secret is needed (public client + PKCE). Connect opens your browser."
  tr: "Azure'da: bir uygulama kaydedin, devredilmiş Mail.Send iznini ekleyin ve 'Mobile and desktop applications' altında http://localhost yönlendirme URI'sini ekleyin. İstemci gizli anahtarı gerekmez (genel istemci + PKCE). Bağlan, tarayıcınızı açar."
  es: "En Azure: registra una aplicación, añade el permiso delegado Mail.Send y, en 'Mobile and desktop applications', añade la URI de redirección http://localhost. No se necesita secreto de cliente (cliente público + PKCE). Conectar abre el navegador."
  de: "In Azure: registriere eine App, füge die delegierte Berechtigung Mail.Send hinzu und trage unter 'Mobile and desktop applications' die Redirect-URI http://localhost ein. Kein Client-Secret nötig (öffentlicher Client + PKCE). Verbinden öffnet den Browser."
  fr: "Dans Azure : enregistrez une application, ajoutez l'autorisation déléguée Mail.Send et, sous 'Mobile and desktop applications', ajoutez l'URI de redirection http://localhost. Aucun secret client nécessaire (client public + PKCE). Connecter ouvre votre navigateur."
  it: "In Azure: registra un'app, aggiungi l'autorizzazione delegata Mail.Send e, in 'Mobile and desktop applications', aggiungi l'URI di reindirizzamento http://localhost. Non serve alcun client secret (client pubblico + PKCE). Connetti apre il browser."
  pt: "No Azure: registe uma aplicação, adicione a permissão delegada Mail.Send e, em 'Mobile and desktop applications', adicione o URI de redirecionamento http://localhost. Não é necessário segredo de cliente (cliente público + PKCE). Ligar abre o navegador."
