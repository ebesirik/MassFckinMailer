acct.ses_note:
  en: "The From address must be a verified SES identity. New accounts are in the sandbox — recipients must also be verified until you request production access."
  tr: "Gönderen adresi doğrulanmış bir SES kimliği olmalıdır. Yeni hesaplar sanal alandadır — üretim erişimi talep edene kadar alıcılar da doğrulanmalıdır."
  es: "La dirección de remitente debe ser una identidad SES verificada. Las cuentas nuevas están en el sandbox: los destinatarios también deben verificarse hasta que solicites acceso de producción."
  de: "Die Absenderadresse muss eine verifizierte SES-Identität sein. Neue Konten sind in der Sandbox — Empfänger müssen ebenfalls verifiziert sein, bis du Produktionszugriff beantragst."
  fr: "L'adresse d'expéditeur doit être une identité SES vérifiée. Les nouveaux comptes sont en bac à sable — les destinataires doivent aussi être vérifiés jusqu'à la demande d'accès en production."
  it: "L'indirizzo mittente deve essere un'identità SES verificata. I nuovi account sono in sandbox: anche i destinatari devono essere verificati finché non richiedi l'accesso in produzione."
  pt: "O endereço do remetente tem de ser uma identidade SES verificada. As contas novas estão na sandbox — os destinatários também têm de ser verificados até solicitar o acesso de produção."
  ru: "Адрес отправителя должен быть подтверждённой личностью SES. Новые аккаунты находятся в песочнице — получатели тоже должны быть подтверждены, пока вы не запросите производственный доступ."
  zh: "发件人地址必须是已验证的 SES 身份。新账户处于沙盒模式 — 在申请生产访问权限之前，收件人也必须经过验证。"
  ja: "差出人アドレスは検証済みの SES ID である必要があります。新しいアカウントはサンドボックス内にあり、本番アクセスを申請するまでは宛先も検証が必要です。"
  nl: "Het afzenderadres moet een geverifieerde SES-identiteit zijn. Nieuwe accounts staan in de sandbox — ook ontvangers moeten geverifieerd zijn totdat je productietoegang aanvraagt."
  pl: "Adres nadawcy musi być zweryfikowaną tożsamością SES. Nowe konta są w trybie piaskownicy — odbiorcy również muszą być zweryfikowani, dopóki nie poprosisz o dostęp produkcyjny."
