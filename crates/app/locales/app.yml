acct.gmail_note:
  en: "In Google Cloud: enable the Gmail API, create an OAuth client of type 'Desktop app', then paste its client ID and secret here. Connect opens your browser to grant the gmail.send scope; personal Gmail is capped around 500/day."
  tr: "Google Cloud'da: Gmail API'yi etkinleştirin, 'Desktop app' türünde bir OAuth istemcisi oluşturun ve istemci kimliği ile gizli anahtarını buraya yapıştırın. Bağlan, gmail.send iznini vermek için tarayıcınızı açar; kişisel Gmail günde ~500 ile sınırlıdır."
  es: "En Google Cloud: activa la API de Gmail, crea un cliente OAuth de tipo 'Desktop app' y pega aquí su ID de cliente y secreto. Conectar abre el navegador para conceder el ámbito gmail.send; Gmail personal tiene un límite de ~500/día."
  de: "In Google Cloud: aktiviere die Gmail-API, erstelle einen OAuth-Client vom Typ 'Desktop app' und füge dessen Client-ID und Secret hier ein. Verbinden öffnet den Browser, um den Bereich gmail.send zu gewähren; privates Gmail ist auf ~500/Tag begrenzt."
  fr: "Dans Google Cloud : activez l'API Gmail, créez un client OAuth de type 'Desktop app', puis collez son ID client et son secret ici. Connecter ouvre votre navigateur pour accorder la portée gmail.send ; Gmail personnel est limité à ~500/jour."
  it: "In Google Cloud: abilita l'API Gmail, crea un client OAuth di tipo 'Desktop app', poi incolla qui il suo ID client e secret. Connetti apre il browser per concedere l'ambito gmail.send; Gmail personale è limitato a ~500/giorno."
  pt: "No Google Cloud: ative a API do Gmail, crie um cliente OAuth do tipo 'Desktop app' e cole aqui o ID de cliente e o segredo. Ligar abre o navegador para conceder o âmbito gmail.send; o Gmail pessoal está limitado a ~500/dia."
